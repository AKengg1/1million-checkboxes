<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1,000,000 Checkboxes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            font-family: monospace;
            color: #ccc;
        }

        #header {
            position: sticky;
            top: 0;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #header h1 { font-size: 14px; color: #fff; }
        #stats { font-size: 12px; color: #555; }
        #stats b { color: #00ff88; }

        #container {
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        input[type="checkbox"] { display: none; }

        label {
            width: 18px;
            height: 18px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        label svg { display: none; }

        input[type="checkbox"]:checked + label {
            background: #00ff88;
            border-color: #00cc66;
        }

        input[type="checkbox"]:checked + label svg {
            display: block;
        }

        #loader {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>1,000,000 checkboxes</h1>
        <div id="stats">checked: <b id="count">0</b> / 1,000,000</div>
    </div>

    <div id="container"></div>
    <div id="loader">loading...</div>

    <script>
        const TOTAL = 1000000
        const BATCH = 2000

        const state = new Uint8Array(TOTAL)
        let loaded = 0
        let checkedCount = 0
        let isLoading = false

        const countEl = document.getElementById('count')
        const container = document.getElementById('container')
        const loader = document.getElementById('loader')

        function loadMore() {
            if (isLoading || loaded >= TOTAL) return
            isLoading = true

            const end = Math.min(loaded + BATCH, TOTAL)
            const frag = document.createDocumentFragment()

            for (let i = loaded; i < end; i++) {
                const input = document.createElement('input')
                input.type = 'checkbox'
                input.id = 'cb' + i

                const label = document.createElement('label')
                label.htmlFor = 'cb' + i
                label.innerHTML = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                    <polyline points="1.5,5 4,7.5 8.5,2" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>`

                input.addEventListener('change', () => {
                    state[i] = input.checked ? 1 : 0
                    input.checked ? checkedCount++ : checkedCount--
                    countEl.textContent = checkedCount.toLocaleString()
                })

                frag.appendChild(input)
                frag.appendChild(label)
            }

            container.appendChild(frag)
            loaded = end
            isLoading = false

            if (loaded >= TOTAL) {
                loader.textContent = 'all 1,000,000 loaded'
            } else {
                loader.textContent = `loaded ${loaded.toLocaleString()} / 1,000,000`
            }
        }

        // load first batch immediately
        loadMore()

        // load more as user scrolls near bottom
        window.addEventListener('scroll', () => {
            const nearBottom = window.innerHeight + window.scrollY >= document.body.scrollHeight - 300
            if (nearBottom) loadMore()
        })
    </script>
</body>
</html>
